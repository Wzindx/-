version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "gradle"
    groups:
      android-gradle-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "gradle-wrapper"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "com.android.application"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "com.android.tools.build:gradle"
        update-types:
          - "version-update:semver-major"
