name: Cleanup Failed Workflow Runs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only list failed runs without deleting them'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_pages:
        description: 'How many pages of workflow runs to scan'
        required: false
        default: '10'

permissions:
  actions: write
  contents: read

concurrency:
  group: cleanup-failed-workflow-runs
  cancel-in-progress: false

jobs:
  cleanup:
    name: Cleanup failed workflow runs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Cleanup failed, cancelled, and timed out workflow runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          api_base = "https://api.github.com"
          repository = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          current_run_id = str(os.environ["CURRENT_RUN_ID"])
          dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"

          try:
              max_pages = int(os.environ.get("MAX_PAGES", "10"))
          except ValueError:
              max_pages = 10

          max_pages = max(1, min(max_pages, 50))

          delete_conclusions = {
              "failure",
              "cancelled",
              "timed_out",
              "action_required",
              "startup_failure",
          }

          def request_json(method: str, path: str):
              url = f"{api_base}{path}"
              req = urllib.request.Request(
                  url,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "cleanup-failed-workflow-runs",
                  },
              )

              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read().decode("utf-8", "replace")
                      if not raw:
                          return None, resp.status
                      return json.loads(raw), resp.status
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", "replace")
                  try:
                      payload = json.loads(raw) if raw else {}
                  except json.JSONDecodeError:
                      payload = {"message": raw}
                  return payload, exc.code

          def list_runs():
              all_runs = []
              encoded_repo = urllib.parse.quote(repository, safe="/")

              for page in range(1, max_pages + 1):
                  path = f"/repos/{encoded_repo}/actions/runs?per_page=100&page={page}"
                  payload, status = request_json("GET", path)

                  if status != 200:
                      print(f"Failed to list workflow runs: HTTP {status}")
                      print(json.dumps(payload, ensure_ascii=False, indent=2))
                      sys.exit(1)

                  runs = payload.get("workflow_runs", [])
                  if not runs:
                      break

                  all_runs.extend(runs)

                  if len(runs) < 100:
                      break

                  time.sleep(0.3)

              return all_runs

          def delete_run(run_id):
              encoded_repo = urllib.parse.quote(repository, safe="/")
              path = f"/repos/{encoded_repo}/actions/runs/{run_id}"
              payload, status = request_json("DELETE", path)
              return payload, status

          print(f"Repository: {repository}")
          print(f"Current cleanup run id: {current_run_id}")
          print(f"Dry run: {dry_run}")
          print(f"Max pages: {max_pages}")

          runs = list_runs()

          targets = []
          for run in runs:
              run_id = str(run.get("id"))
              status = run.get("status")
              conclusion = run.get("conclusion")

              if run_id == current_run_id:
                  continue

              if status in {"queued", "in_progress", "waiting", "requested", "pending"}:
                  continue

              if conclusion in delete_conclusions:
                  targets.append(run)

          print(f"Scanned workflow runs: {len(runs)}")
          print(f"Cleanup targets: {len(targets)}")

          if not targets:
              print("No failed/cancelled/timed_out workflow runs to clean.")
              sys.exit(0)

          deleted = 0
          failed = 0

          for run in targets:
              run_id = run.get("id")
              name = run.get("name")
              title = run.get("display_title")
              conclusion = run.get("conclusion")
              created_at = run.get("created_at")
              html_url = run.get("html_url")

              print("-" * 80)
              print(f"Run ID:     {run_id}")
              print(f"Workflow:   {name}")
              print(f"Title:      {title}")
              print(f"Conclusion: {conclusion}")
              print(f"Created:    {created_at}")
              print(f"URL:        {html_url}")

              if dry_run:
                  print("Dry run: not deleting.")
                  continue

              payload, status = delete_run(run_id)
              if status == 204:
                  deleted += 1
                  print(f"Deleted run {run_id}.")
              else:
                  failed += 1
                  print(f"Failed to delete run {run_id}: HTTP {status}")
                  print(json.dumps(payload, ensure_ascii=False, indent=2))

              time.sleep(0.3)

          print("=" * 80)
          print(f"Deleted: {deleted}")
          print(f"Failed deletions: {failed}")

          if failed:
              sys.exit(1)
          PY
