name: One-shot Release Maintenance

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/one-shot-maintenance.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Retarget v2.1 release and cleanup failed runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: a61d5900575874959849b42cde5365c47923789c
          TAG_NAME: v2.1
        run: |
          set -euo pipefail

          echo "Retarget tag ${TAG_NAME} to ${TARGET_SHA}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG_NAME}" \
              -f sha="${TARGET_SHA}" \
              -F force=true
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${TAG_NAME}" \
              -f sha="${TARGET_SHA}"
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "ImageForge ${TAG_NAME}" \
              --target "${TARGET_SHA}" \
              --latest || true
          fi

          echo "Release:"
          gh release view "${TAG_NAME}" --json tagName,name,url,targetCommitish,assets

          echo "Cleanup failed/cancelled/skipped workflow runs"
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "skipped") | [.id, .name, .conclusion, .head_sha] | @tsv' \
            > /tmp/runs-to-delete.tsv || true

          cat /tmp/runs-to-delete.tsv || true

          while IFS=$'\t' read -r run_id run_name conclusion head_sha; do
            if [ -z "${run_id:-}" ]; then
              continue
            fi
            echo "Deleting run ${run_id} ${run_name} ${conclusion} ${head_sha}"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" || true
          done < /tmp/runs-to-delete.tsv

          echo "Remaining recent runs:"
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=20" \
            --jq '.workflow_runs[] | [.id, .name, .status, (.conclusion // ""), .head_sha] | @tsv'
