name: Auto Apply App Info Update

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/auto-apply-app-info.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch MainActivity app info
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/yang/emperor/MainActivity.kt")
          text = path.read_text(encoding="utf-8")
          original = text

          if "import android.content.Intent" not in text:
              text = text.replace(
                  "import android.content.Context\n",
                  "import android.content.Context\nimport android.content.Intent\n",
                  1,
              )

          text = text.replace('text = "UniversalImageStudio",', 'text = "ImageForge",')

          if "private const val DEVELOPER_QQ" not in text:
              anchor = "class MainActivity : ComponentActivity() {"
              if anchor not in text:
                  raise SystemExit("MainActivity class anchor not found")
              inject = '''private const val DEVELOPER_QQ = "2753761311"
          private const val IMAGEFORGE_REPO_URL = "https://github.com/Wzindx/ImageForge"

          private fun openDeveloperQQ(context: Context) {
              val qqIntent = Intent(Intent.ACTION_VIEW, Uri.parse("mqqwpa://im/chat?chat_type=wpa&uin=$DEVELOPER_QQ")).apply {
                  addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
              }
              val webIntent = Intent(Intent.ACTION_VIEW, Uri.parse("https://wpa.qq.com/msgrd?v=3&uin=$DEVELOPER_QQ&site=qq&menu=yes")).apply {
                  addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
              }

              runCatching {
                  context.startActivity(qqIntent)
              }.getOrElse {
                  runCatching { context.startActivity(webIntent) }
              }
          }

          '''
              text = text.replace(anchor, inject + anchor, 1)

          settings_start = text.find("private fun SettingsScreen(")
          if settings_start < 0:
              raise SystemExit("SettingsScreen not found")

          if "val context = androidx.compose.ui.platform.LocalContext.current" not in text[settings_start:]:
              target = ") {\n    Scaffold(\n        containerColor = pageBg"
              idx = text.find(target, settings_start)
              if idx < 0:
                  raise SystemExit("SettingsScreen scaffold start not found")
              text = (
                  text[:idx]
                  + ") {\n    val context = androidx.compose.ui.platform.LocalContext.current\n\n    Scaffold(\n        containerColor = pageBg"
                  + text[idx + len(target):]
              )

          title = 'SectionTitle("软件信息", "应用名称、开源地址和开发者联系方式")'
          if title not in text:
              settings_notice_block = '''                    if (settingsNotice.isNotBlank()) {
                              StatusCard(settingsNotice)
                          }
          '''
              pos = text.find(settings_notice_block, settings_start)
              if pos < 0:
                  raise SystemExit("settingsNotice block not found")

              insert_after = pos + len(settings_notice_block)
              first_card_close = '''                }
                      }
          '''
              close_pos = text.find(first_card_close, insert_after)
              if close_pos < 0:
                  raise SystemExit("settings card close not found")

              info_card = '''
                      }

                      ElevatedCard(
                          colors = CardDefaults.elevatedCardColors(containerColor = cardBg),
                          shape = RoundedCornerShape(28.dp)
                      ) {
                          Column(
                              modifier = Modifier.padding(18.dp),
                              verticalArrangement = Arrangement.spacedBy(14.dp)
                          ) {
                              SectionTitle("软件信息", "应用名称、开源地址和开发者联系方式")

                              Row(
                                  modifier = Modifier
                                      .fillMaxWidth()
                                      .clip(RoundedCornerShape(20.dp))
                                      .background(MaterialTheme.colorScheme.surfaceContainerLowest)
                                      .clickable { openDeveloperQQ(context) }
                                      .padding(14.dp),
                                  horizontalArrangement = Arrangement.spacedBy(14.dp),
                                  verticalAlignment = Alignment.CenterVertically
                              ) {
                                  Box(
                                      modifier = Modifier
                                          .size(58.dp)
                                          .clip(CircleShape)
                                          .background(accent.copy(alpha = 0.14f)),
                                      contentAlignment = Alignment.Center
                                  ) {
                                      Text("QQ", color = accent, fontWeight = FontWeight.Black, fontSize = 20.sp)
                                  }

                                  Column(
                                      modifier = Modifier.weight(1f),
                                      verticalArrangement = Arrangement.spacedBy(4.dp)
                                  ) {
                                      Text(
                                          text = "开发者 QQ",
                                          color = MaterialTheme.colorScheme.primary,
                                          fontWeight = FontWeight.SemiBold,
                                          style = MaterialTheme.typography.labelLarge
                                      )
                                      Text(
                                          text = "$DEVELOPER_QQ · 点击直达 QQ",
                                          style = MaterialTheme.typography.bodyMedium,
                                          color = MaterialTheme.colorScheme.onSurface
                                      )
                                  }

                                  Text("›", fontSize = 34.sp, color = accent, fontWeight = FontWeight.SemiBold)
                              }

                              InfoCard("应用名称", "ImageForge / 通用图像工坊")
                              InfoCard("当前版本", "2.0.0")
                              InfoCard("开源地址", IMAGEFORGE_REPO_URL)
                              InfoCard("图片保存目录", "系统相册 / Pictures / ImageForge")
                          }
                      }
          '''
              text = text[:close_pos] + info_card + text[close_pos + len(first_card_close):]

          path.write_text(text, encoding="utf-8")

          print("changed", text != original)
          for key in [
              "DEVELOPER_QQ",
              "openDeveloperQQ",
              "软件信息",
              "点击直达 QQ",
              "ImageForge / 通用图像工坊",
              'text = "ImageForge"',
          ]:
              print(key, key in text)
          PY

      - name: Commit MainActivity update
        run: |
          if git diff --quiet -- app/src/main/java/com/yang/emperor/MainActivity.kt; then
            echo "No MainActivity changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yang/emperor/MainActivity.kt
          git commit -m "feat: add app info and developer contact"
          git push
