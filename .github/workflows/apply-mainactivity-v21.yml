name: Apply MainActivity v2.1 UI polish

on:
  push:
    paths:
      - ".github/workflows/apply-mainactivity-v21.yml"
      - ".github/scripts/apply_mainactivity_v21.py"
      - ".github/apply-mainactivity-v21.trigger"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply MainActivity UI changes
        run: python3 .github/scripts/apply_mainactivity_v21.py

      - name: Commit UI polish and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yang/emperor/MainActivity.kt
          git rm -f .github/workflows/apply-mainactivity-v21.yml
          git rm -f .github/scripts/apply_mainactivity_v21.py
          if [ -f .github/apply-mainactivity-v21.trigger ]; then
            git rm -f .github/apply-mainactivity-v21.trigger
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Polish main UI interactions for v2.1"
          git push
