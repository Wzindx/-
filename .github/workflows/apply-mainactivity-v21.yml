name: Apply MainActivity v2.1 UI polish

on:
  push:
    paths:
      - ".github/workflows/apply-mainactivity-v21.yml"
      - ".github/apply-mainactivity-v21.trigger"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply MainActivity UI changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("app/src/main/java/com/yang/emperor/MainActivity.kt")
          s = path.read_text(encoding="utf-8")

          if "private fun readableSaveDirectoryLabel(" not in s:
              marker = "private fun detailedTaskErrorMessage(e: Exception, fallback: String): String {"
              helper = r'''
private fun readableSaveDirectoryLabel(uriString: String): String {
    if (uriString.isBlank()) return "系统相册 / Pictures/ImageForge"
    return try {
        val uri = Uri.parse(uriString)
        val lastSegment = uri.lastPathSegment.orEmpty()
        val decoded = Uri.decode(lastSegment)
        val readable = decoded
            .substringAfterLast(':')
            .substringAfterLast('/')
            .ifBlank { uri.host.orEmpty() }
            .ifBlank { "已选择的文件夹" }
        "自定义目录 / $readable"
    } catch (_: Exception) {
        "自定义目录 / 已选择的文件夹"
    }
}

'''
              if marker not in s:
                  raise SystemExit("marker for helper not found")
              s = s.replace(marker, helper + marker, 1)

          old = '''val saveDirectoryLabel = if (customSaveDirectoryUriString.isNotBlank()) {
        "自定义目录已设置"
    } else {
        "系统相册 / Pictures/ImageForge"
    }'''
          new = '''val saveDirectoryLabel = readableSaveDirectoryLabel(customSaveDirectoryUriString)'''
          if old in s:
              s = s.replace(old, new, 1)

          s = s.replace('title = { Text("图片记录详情") }', 'title = { Text("图片预览") }')
          s = s.replace('title = { Text(if (item.isSuccess) "图片记录详情" else "处理失败") }', 'title = { Text(if (item.isSuccess) "图片预览" else "处理失败") }')

          s = re.sub(
              r'onShowOnboarding\s*=\s*\{\s*showOnboarding\s*=\s*true\s*\}',
              'onShowOnboarding = {}',
              s,
              count=1,
          )

          if "首页直接调整，修改后立即保存" not in s:
              old_block = '''ConfigEntryCard(
                            title = "接口与模型",
                            value = "$selectedApi · $selectedModel",
                            description = "点击进入设置页调整 API 与模型。",
                            onClick = { showSettings = true },
                            icon = Icons.AutoMirrored.Filled.OpenInNew
                        )'''
              new_block = '''Surface(
                            modifier = Modifier.fillMaxWidth(),
                            shape = RoundedCornerShape(28.dp),
                            color = Color.White.copy(alpha = 0.92f),
                            tonalElevation = 0.dp,
                            shadowElevation = 10.dp,
                            border = BorderStroke(1.dp, Color.White.copy(alpha = 0.55f))
                        ) {
                            Column(
                                modifier = Modifier.padding(18.dp),
                                verticalArrangement = Arrangement.spacedBy(14.dp)
                            ) {
                                Row(
                                    modifier = Modifier.fillMaxWidth(),
                                    horizontalArrangement = Arrangement.SpaceBetween,
                                    verticalAlignment = Alignment.CenterVertically
                                ) {
                                    Column(modifier = Modifier.weight(1f)) {
                                        Text(
                                            text = "接口与模型",
                                            style = MaterialTheme.typography.titleMedium,
                                            fontWeight = FontWeight.Bold
                                        )
                                        Text(
                                            text = "首页直接调整，修改后立即保存。",
                                            style = MaterialTheme.typography.bodySmall,
                                            color = Color(0xFF6B7280)
                                        )
                                    }
                                    IconButton(onClick = { showSettings = true }) {
                                        Icon(
                                            imageVector = Icons.AutoMirrored.Filled.OpenInNew,
                                            contentDescription = "打开完整设置"
                                        )
                                    }
                                }

                                AppDropdownField(
                                    label = "API 接口",
                                    value = selectedApi,
                                    options = apiOptions,
                                    onValueChange = {
                                        selectedApi = it
                                        showToast(context, "接口已保存。")
                                    }
                                )

                                AppEditableDropdownField(
                                    label = "模型",
                                    value = selectedModel,
                                    options = modelOptions,
                                    onValueChange = {
                                        selectedModel = it
                                        showToast(context, "模型已保存。")
                                    }
                                )
                            }
                        }'''
              if old_block in s:
                  s = s.replace(old_block, new_block, 1)
              else:
                  raise SystemExit("API/model ConfigEntryCard block not found")

          checks = [
              "readableSaveDirectoryLabel",
              "图片预览",
              "首页直接调整，修改后立即保存",
              "onShowOnboarding = {}",
          ]
          missing = [x for x in checks if x not in s]
          if missing:
              raise SystemExit("missing markers: " + ", ".join(missing))
          if "图片记录详情" in s:
              raise SystemExit("old title still exists")

          path.write_text(s, encoding="utf-8")
          PY

      - name: Commit changes and remove one-shot workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-mainactivity-v21.yml
          git add app/src/main/java/com/yang/emperor/MainActivity.kt
          if [ -f .github/apply-mainactivity-v21.trigger ]; then git rm .github/apply-mainactivity-v21.trigger; fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Polish main UI interactions for v2.1"
          git push
