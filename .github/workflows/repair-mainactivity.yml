name: Temporary MainActivity Repair

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/repair-mainactivity.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repair:
    name: Repair Compose primitive state warning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch MainActivity.kt
        shell: python
        run: |
          from pathlib import Path

          path = Path("app/src/main/java/com/yang/emperor/MainActivity.kt")
          src = path.read_text(encoding="utf-8")

          old_import = "import androidx.compose.runtime.mutableStateOf"
          new_import = "import androidx.compose.runtime.mutableIntStateOf\nimport androidx.compose.runtime.mutableStateOf"
          old_state = "    var page by remember { mutableStateOf(0) }"
          new_state = "    var page by remember { mutableIntStateOf(0) }"

          if "import androidx.compose.runtime.mutableIntStateOf" not in src:
              if old_import not in src:
                  raise SystemExit("old import not found")
              src = src.replace(old_import, new_import, 1)

          if old_state not in src and new_state not in src:
              raise SystemExit("onboarding page state line not found")

          src = src.replace(old_state, new_state, 1)

          if "import androidx.compose.runtime.mutableIntStateOf" not in src:
              raise SystemExit("mutableIntStateOf import missing after patch")
          if new_state not in src:
              raise SystemExit("new mutableIntStateOf state line missing after patch")
          if old_state in src:
              raise SystemExit("old mutableStateOf(0) state line still present after patch")

          path.write_text(src, encoding="utf-8")

      - name: Commit repair if changed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- app/src/main/java/com/yang/emperor/MainActivity.kt; then
            echo "MainActivity.kt already repaired."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/yang/emperor/MainActivity.kt
          git commit -m "fix: use primitive int state in onboarding pager"
          git push
