name: One-shot Apply v2.1 UI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply v2.1 UI polish
        shell: python
        run: |
          from pathlib import Path
          import re

          main = Path("app/src/main/java/com/yang/emperor/MainActivity.kt")
          settings = Path("app/src/main/java/com/yang/emperor/SettingsScreen.kt")
          release = Path(".github/workflows/release.yml")

          text = main.read_text(encoding="utf-8")

          helper = r'''
private fun readableSaveDirectoryLabel(uriString: String): String {
    if (uriString.isBlank()) return "/storage/emulated/0/Pictures/ImageForge"

    val decoded = Uri.decode(uriString)
    val primaryMarker = "tree/primary:"
    val primaryIndex = decoded.indexOf(primaryMarker)
    if (primaryIndex >= 0) {
        val relativePath = decoded.substring(primaryIndex + primaryMarker.length).trim('/')
        return if (relativePath.isBlank()) "/storage/emulated/0" else "/storage/emulated/0/$relativePath"
    }

    val documentMarker = "document/primary:"
    val documentIndex = decoded.indexOf(documentMarker)
    if (documentIndex >= 0) {
        val relativePath = decoded.substring(documentIndex + documentMarker.length).trim('/')
        return if (relativePath.isBlank()) "/storage/emulated/0" else "/storage/emulated/0/$relativePath"
    }

    return decoded
        .removePrefix("content://com.android.externalstorage.documents/tree/primary%3A")
        .removePrefix("content://com.android.externalstorage.documents/tree/primary:")
        .ifBlank { uriString }
}
'''
          if "private fun readableSaveDirectoryLabel(" not in text:
              text = text.replace("\n\nclass MainActivity : ComponentActivity() {", "\n" + helper + "\nclass MainActivity : ComponentActivity() {")

          old_label = '''    val saveDirectoryLabel = if (customSaveDirectoryUriString.isNotBlank()) {
        "自定义目录：$customSaveDirectoryUriString"
    } else {
        "系统相册 / Pictures/ImageForge"
    }
'''
          text = text.replace(old_label, '    val saveDirectoryLabel = readableSaveDirectoryLabel(customSaveDirectoryUriString)\n')

          old_dialog = '''    previewHistoryItem?.let { item ->
        AlertDialog(
            onDismissRequest = { previewHistoryItem = null },
            title = { Text("图片记录详情") },
            text = {
                Column(verticalArrangement = Arrangement.spacedBy(10.dp)) {
                    Text("模型：${item.model}", fontWeight = FontWeight.Bold)
                    Text("类型：${if (item.mode == "edit") "图生图 / 编辑" else "文生图"}")
                    Text("时间：${item.time}")
                    Text("状态：${when (item.state) { "running" -> "处理中"; "failed" -> "处理失败"; else -> "处理成功" }}")
                    if (item.prompt.isNotBlank()) {
                        Text("提示词：", fontWeight = FontWeight.Bold)
                        Text(item.prompt, color = Color(0xFF4B5563))
                    }
                    if (item.error.isNotBlank()) {
                        Text("错误：${item.error.lines().firstOrNull { it.isNotBlank() } ?: item.error}", color = Color(0xFFE11D48))
                    } else {
                        Text("保存路径：${item.path}", color = Color(0xFF6B7280))
                    }
                }
            },
            confirmButton = {
                TextButton(onClick = { previewHistoryItem = null }) { Text("关闭") }
            },
            dismissButton = {
                TextButton(onClick = {
                    copyTextToClipboard(context, "ImageForge Prompt", item.prompt)
                }) {
                    Text("复制提示词")
                }
            },
            shape = RoundedCornerShape(24.dp)
        )
    }
'''
          new_dialog = '''    previewHistoryItem?.let { item ->
        var showPromptInPreview by remember(item.time, item.prompt) { mutableStateOf(false) }
        val previewBitmap by produceState<Bitmap?>(initialValue = null, key1 = item.path) {
            value = if (item.state == "success" && item.path.startsWith("content://")) {
                withContext(Dispatchers.IO) {
                    runCatching {
                        context.contentResolver.openInputStream(item.path.toUri())?.use { input ->
                            BitmapFactory.decodeStream(input)
                        }
                    }.getOrNull()
                }
            } else {
                null
            }
        }

        AlertDialog(
            onDismissRequest = { previewHistoryItem = null },
            title = { Text(if (item.state == "success") "图片预览" else "处理失败") },
            text = {
                Column(verticalArrangement = Arrangement.spacedBy(12.dp)) {
                    if (item.state == "success") {
                        if (previewBitmap != null) {
                            Box(
                                modifier = Modifier
                                    .fillMaxWidth()
                                    .clip(RoundedCornerShape(18.dp))
                                    .background(Color.White)
                                    .border(1.dp, Color(0xFFD9E1F5), RoundedCornerShape(18.dp))
                                    .padding(6.dp)
                            ) {
                                Image(
                                    bitmap = previewBitmap!!.asImageBitmap(),
                                    contentDescription = null,
                                    modifier = Modifier
                                        .fillMaxWidth()
                                        .aspectRatio(previewBitmap!!.width.toFloat() / previewBitmap!!.height.toFloat())
                                )
                            }
                        } else {
                            StatusCard("图片已生成，可通过下方按钮下载、打开或分享。")
                        }

                        if (showPromptInPreview && item.prompt.isNotBlank()) {
                            Surface(
                                modifier = Modifier.fillMaxWidth(),
                                color = MaterialTheme.colorScheme.surfaceContainerLowest,
                                shape = RoundedCornerShape(16.dp)
                            ) {
                                Text(
                                    text = item.prompt,
                                    modifier = Modifier.padding(14.dp),
                                    color = Color(0xFF4B5563),
                                    style = MaterialTheme.typography.bodyMedium
                                )
                            }
                        }

                        Button(
                            onClick = { showPromptInPreview = !showPromptInPreview },
                            modifier = Modifier.fillMaxWidth()
                        ) {
                            Text(if (showPromptInPreview) "隐藏描述内容" else "查看描述内容")
                        }

                        TextButton(
                            onClick = {
                                copyTextToClipboard(context, "ImageForge Prompt", item.prompt)
                                status = "提示词已复制。"
                            },
                            modifier = Modifier.fillMaxWidth()
                        ) {
                            Text("复制提示词")
                        }

                        Button(
                            onClick = {
                                shareImageFromHistory(context, item.path)
                                status = "已打开系统图片处理。"
                            },
                            modifier = Modifier.fillMaxWidth()
                        ) {
                            Text("下载图片 / 打开图片")
                        }

                        TextButton(
                            onClick = {
                                shareImageFromHistory(context, item.path)
                                status = "已打开系统分享。"
                            },
                            modifier = Modifier.fillMaxWidth()
                        ) {
                            Text("分享图片")
                        }
                    } else {
                        Text("模型：${item.model}", fontWeight = FontWeight.Bold)
                        Text("时间：${item.time}", color = Color(0xFF6B7280))
                        if (item.prompt.isNotBlank()) {
                            Button(
                                onClick = { showPromptInPreview = !showPromptInPreview },
                                modifier = Modifier.fillMaxWidth()
                            ) {
                                Text(if (showPromptInPreview) "隐藏描述内容" else "查看描述内容")
                            }
                            if (showPromptInPreview) {
                                Text(item.prompt, color = Color(0xFF4B5563))
                            }
                        }
                        if (item.error.isNotBlank()) {
                            Text(
                                text = "错误：${item.error.lines().firstOrNull { it.isNotBlank() } ?: item.error}",
                                color = Color(0xFFE11D48)
                            )
                            TextButton(
                                onClick = {
                                    copyTextToClipboard(context, "ImageForge Error", item.error)
                                    status = "错误详情已复制。"
                                },
                                modifier = Modifier.fillMaxWidth()
                            ) {
                                Text("复制错误详情")
                            }
                        }
                    }
                }
            },
            confirmButton = {
                TextButton(onClick = { previewHistoryItem = null }) { Text("关闭") }
            },
            dismissButton = {},
            shape = RoundedCornerShape(24.dp)
        )
    }
'''
          if old_dialog in text:
              text = text.replace(old_dialog, new_dialog)

          text = text.replace('''            onShowOnboarding = {
                currentRoute = ScreenRoute.SETTINGS
                onboardingReturnRoute = ScreenRoute.SETTINGS.name
                onboardingSessionId = System.nanoTime()
                showOnboarding = true
            },''', '''            onShowOnboarding = {},''')

          old_model_card = '''                            ConfigEntryCard(
                                title = "接口与模型",
                                primary = apiMode.label,
                                secondary = "模型：${if (selectedImage != null) editModel else generateModel}",
                                onClick = { showModelSheet = true }
                            )

                            ConfigEntryCard(
'''
          new_model_panel = '''                            Surface(
                                modifier = Modifier.fillMaxWidth(),
                                color = MaterialTheme.colorScheme.surfaceContainerLowest,
                                shape = RoundedCornerShape(20.dp),
                                tonalElevation = 1.dp
                            ) {
                                Column(
                                    modifier = Modifier.padding(14.dp),
                                    verticalArrangement = Arrangement.spacedBy(10.dp)
                                ) {
                                    SectionTitle("接口与模型", "首页直接调整，修改后立即保存")
                                    AppDropdownField(
                                        title = "接口模式",
                                        selected = apiMode.label,
                                        options = ApiMode.entries.map { it.label },
                                        onSelected = { label ->
                                            ApiMode.entries.firstOrNull { it.label == label }?.let {
                                                apiMode = it
                                                prefs.edit { putString("apiMode", it.value) }
                                                status = "接口模式已保存。"
                                            }
                                        }
                                    )
                                    AppEditableDropdownField(
                                        title = if (selectedImage != null) "图生图模型 ID" else "文生图模型 ID",
                                        value = if (selectedImage != null) customEditModel else customGenerateModel,
                                        options = imageModels,
                                        placeholder = "输入或选择模型 ID",
                                        onValueChange = { value ->
                                            if (selectedImage != null) {
                                                customEditModel = value
                                                editModel = value
                                                prefs.edit { putString("editModel", value.trim()) }
                                            } else {
                                                customGenerateModel = value
                                                generateModel = value
                                                prefs.edit {
                                                    putString("generateModel", value.trim())
                                                    putString("model", value.trim())
                                                }
                                            }
                                        },
                                        onSelected = { value ->
                                            if (selectedImage != null) {
                                                customEditModel = value
                                                editModel = value
                                                prefs.edit { putString("editModel", value.trim()) }
                                            } else {
                                                customGenerateModel = value
                                                generateModel = value
                                                prefs.edit {
                                                    putString("generateModel", value.trim())
                                                    putString("model", value.trim())
                                                }
                                            }
                                            status = "模型已保存。"
                                        }
                                    )
                                }
                            }

                            ConfigEntryCard(
'''
          if old_model_card in text:
              text = text.replace(old_model_card, new_model_panel)

          if "图片记录详情" in text:
              raise SystemExit("old history dialog title still exists")
          if "val saveDirectoryLabel = readableSaveDirectoryLabel(customSaveDirectoryUriString)" not in text:
              raise SystemExit("readable save directory label not applied")
          if "首页直接调整，修改后立即保存" not in text:
              raise SystemExit("external model controls not applied")
          if text.count("{") != text.count("}"):
              raise SystemExit("MainActivity brace mismatch")
          main.write_text(text, encoding="utf-8")

          s = settings.read_text(encoding="utf-8")
          old_btn = '''                    TextButton(
                        onClick = onShowOnboarding,
                        modifier = Modifier.fillMaxWidth()
                    ) {
                        Text("再来一次引导")
                    }

'''
          s = s.replace(old_btn, "")
          if "再来一次引导" in s:
              raise SystemExit("onboarding replay button still exists")
          if s.count("{") != s.count("}"):
              raise SystemExit("SettingsScreen brace mismatch")
          settings.write_text(s, encoding="utf-8")

          r = release.read_text(encoding="utf-8")
          r = r.replace(
              "本版本是 ImageForge v2.1 精修版，重点完善历史记录交互、后台生成、错误诊断、保存路径管理、权限引导与自动构建发布链路。",
              "本版本是 ImageForge v2.1 精修版，重点完善图片预览、按钮化历史操作、首页模型控制、后台生成、精准错误诊断、自定义保存路径、权限引导与自动构建发布链路。"
          )
          r = r.replace(
              "- 历史记录外层仅展示模型、处理状态、时间和图片方式，不再暴露提示词和保存路径。",
              "- 历史记录详情改为“图片预览”，正常生成结果优先展示图片，描述、复制、下载、打开、分享和关闭全部按钮化。"
          )
          r = r.replace(
              "- 删除入口收敛为长按删除，避免误触和界面冗余。",
              "- 首页直接外显接口模式与当前模型控制，不再必须进入二级说明面板才能调整模型。\n          - 删除入口收敛为长按删除，避免误触和界面冗余。"
          )
          r = r.replace(
              "- 首页直接外显接口模式与当前模型控制，不再必须进入二级说明面板才能调整模型。\\n          - 删除入口收敛为长按删除，避免误触和界面冗余。",
              "- 首页直接外显接口模式与当前模型控制，不再必须进入二级说明面板才能调整模型。\n          - 删除入口收敛为长按删除，避免误触和界面冗余。"
          )
          r = r.replace(
              "- 图片保存路径支持系统目录选择和授权，默认仍兼容系统相册 / Pictures/ImageForge。",
              "- 图片保存路径支持系统目录选择和授权，设置页尽量展示 /storage/emulated/0/... 形式的直观路径。"
          )
          r = r.replace(
              '''            gh release edit "$TAG_NAME" \\
              --title "ImageForge $TAG_NAME" \\
              --notes-file "$BODY_FILE" \\
              --latest''',
              '''            gh release edit "$TAG_NAME" \\
              --target "$RELEASE_SHA" \\
              --title "ImageForge $TAG_NAME" \\
              --notes-file "$BODY_FILE" \\
              --latest'''
          )
          release.write_text(r, encoding="utf-8")

      - name: Commit applied changes and self-clean
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/one-shot-apply-v21-ui.yml .github/v21-ui-polish-trigger.txt
          git add app/src/main/java/com/yang/emperor/MainActivity.kt app/src/main/java/com/yang/emperor/SettingsScreen.kt .github/workflows/release.yml .github/workflows/one-shot-apply-v21-ui.yml .github/v21-ui-polish-trigger.txt
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Polish v2.1 image preview UI"
          git push