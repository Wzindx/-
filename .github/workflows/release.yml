name: Release Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.5"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.5"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-release-apk
          path: dist-release
          if_no_artifact_found: fail

      - name: Collect release APK
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          RELEASE_APK="$(find dist-release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "No release APK artifact found from triggering workflow."
            find dist-release -maxdepth 5 -type f -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "$GRADLE_VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v$GRADLE_VERSION_NAME"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          else
            VERSION_NAME="${TAG_NAME#v}"
          fi

          echo "GRADLE_VERSION_NAME=$GRADLE_VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          unset ANDROID_KEYSTORE_PATH
          unset ANDROID_KEYSTORE_PASSWORD
          unset ANDROID_KEY_ALIAS
          unset ANDROID_KEY_PASSWORD

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi

          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace

          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "Manual release build did not produce a release APK."
            find app/build/outputs -type f -name '*.apk' -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"

      - name: Verify release APK exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          test -f dist/app-release.apk

      - name: Delete stale debug APK asset from this release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh release delete-asset "$TAG_NAME" app-debug.apk -y
          exit 0

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            ## ${{ env.TAG_NAME }} 更新内容

            这次版本重点完善接口兼容、图生图可用性、系统动态色沉浸体验，并继续保持固定签名 release 发布。

            ### 接口兼容与图生图适配
            - 新增 **接口模式切换**：支持 `Images API` 与 `Responses API` 两种模式。
            - 图生图 / 编辑现在不再只依赖 `/v1/images/edits`，兼容部分仅支持 `/v1/responses` 的中转服务。
            - 新增 **文生图模型** 与 **图生图模型** 分离配置，避免一个模型文生图可用但图生图不可用的问题。
            - 首页当前模型信息改为展示：接口模式、文生图模型、图生图模型。
            - 更适合不同 OpenAI 兼容站、中转站、分组渠道之间的差异化能力。

            ### 沉浸式与 Monet 动态色
            - 接入 Android 12+ **Monet / Material You 动态色**。
            - 状态栏、导航栏颜色改为跟随系统动态主题与应用容器色，而不是单纯透明覆盖。
            - 系统栏图标会根据明暗主题自动切换，更贴近系统原生沉浸效果。
            - 修复之前透明系统栏与页面顶栏配色不一致、观感割裂的问题。

            ### 签名与安装
            - 持续使用仓库内固定 release JKS 生成正式签名 APK。
            - 版本升级为 `1.5`，版本代码升级为 `6`。
            - 后续版本继续复用同一签名，可直接覆盖升级安装。
            - 发布页继续只保留正式签名的 `app-release.apk`。

            ### 图标、性能与体验延续优化
            - 保持图标前景安全区优化，降低圆角/圆形桌面裁切风险。
            - 保留结果预览采样解码，继续降低大图预览卡顿和内存抖动。
            - 首页高级参数、历史记录继续按需展开，减轻首屏渲染压力。
            - 历史记录仍限制最近 8 条展示，兼顾流畅性与可读性。

            ### 版本信息
            - Release Tag: `${{ env.TAG_NAME }}`
            - Version Name: `${{ env.VERSION_NAME }}`
            - Gradle Version Name: `${{ env.GRADLE_VERSION_NAME }}`
            - Artifact: `${{ env.APK_CHANNEL }}`

          files: dist/app-release.apk
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
