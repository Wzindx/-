name: Release Android APK
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.5"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.5"
        required: false
        type: string
permissions:
  contents: write
  actions: read
jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Release APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-release-apk
          path: dist-release
          if_no_artifact_found: fail
      - name: Collect release APK
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          RELEASE_APK="$(find dist-release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "No release APK artifact found from triggering workflow."
            find dist-release -maxdepth 5 -type f -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"
      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "$GRADLE_VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v$GRADLE_VERSION_NAME"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          else
            VERSION_NAME="${TAG_NAME#v}"
          fi
          echo "GRADLE_VERSION_NAME=$GRADLE_VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3
      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            mkdir -p "$RUNNER_TEMP/android-signing"
            KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            chmod 600 "$KEYSTORE_PATH"
            export ANDROID_KEYSTORE_PATH="$KEYSTORE_PATH"
          fi

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi
          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace
          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "Manual release build did not produce a release APK."
            find app/build/outputs -type f -name '*.apk' -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"
      - name: Verify release APK exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          test -f dist/app-release.apk
      - name: Delete stale debug APK asset from this release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh release delete-asset "$TAG_NAME" app-debug.apk -y
          exit 0
      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            ## UniversalImageStudio v1.8

            v1.8 是一次交互与任务处理升级版本。本版重点加入首次引导、后台任务队列和更清爽的首页状态逻辑，让应用更适合连续创作。

            ### 本版重点
            - 首次引导页：第一次打开时引导填写 Base URL 和 API Key，减少首页提示干扰。
            - 设置页可重新引导：设置页新增“再来一次引导”，需要时可重新进入初始化流程。
            - 首页提示精简：取消常驻绿色欢迎/配置提示；首页只在真实任务状态、错误或完成时显示状态条。
            - 后台任务队列：生成任务加入后台处理，可继续提交新的生成/编辑任务，不再一次只能等一张。
            - 历史任务状态：历史页区分处理中、处理成功、处理失败，并统计不同状态数量。
            - 底部导航优化：弱化重复色块，让创作、历史、设置三栏的选中态更统一。
            - 继续保留 v1.7 的轻量首页、底部抽屉配置、手动查看/下载结果等体验。

            ### 接口能力
            - 支持 OpenAI 兼容的图像生成与编辑接口。
            - 支持 /v1/images/generations。
            - 支持 /v1/images/edits。
            - 支持 /v1/responses。
            - 保留 Generations 图生图兼容模式。
            - 支持自定义 Base URL、API Key、文生图模型 ID、图生图模型 ID。

            ### 安全与数据
            - API Key 使用 Android Keystore + EncryptedSharedPreferences 加密保存。
            - 旧版明文配置会自动迁移到加密配置。
            - 历史记录兼容旧字段，并新增任务状态与错误信息。
            - Release APK 通过 GitHub Actions Secrets 签名构建，不在仓库保存签名密钥。

            ### 升级建议
            - 建议 v1.7 用户直接升级到 v1.8。
            - 升级后如果接口异常，请进入“设置”页重新保存 Base URL 和 API Key。
            - 如果想重新体验初始化流程，可在设置页点击“再来一次引导”。
            - 请妥善保管自己的 API Key，避免在聊天、截图或公开仓库中泄露。
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
