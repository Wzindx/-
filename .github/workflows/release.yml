name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.3"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.3"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        id: download_release_apk
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-release-apk
          path: dist-release
          if_no_artifact_found: warn

      - name: Download Debug APK artifact as fallback
        if: github.event_name == 'workflow_run'
        id: download_debug_apk
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-debug-apk
          path: dist-debug
          if_no_artifact_found: warn

      - name: Collect APK for release
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          mkdir -p dist
          if find dist-release -name '*.apk' -print -quit 2>/dev/null | grep -q .; then
            cp "$(find dist-release -name '*.apk' -print -quit)" dist/
            echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"
          elif find dist-debug -name '*.apk' -print -quit 2>/dev/null | grep -q .; then
            cp "$(find dist-debug -name '*.apk' -print -quit)" dist/
            echo "APK_CHANNEL=debug APK" >> "$GITHUB_ENV"
          else
            echo "No APK artifact found from triggering workflow."
            echo "dist-release:"
            find dist-release -maxdepth 3 -type f -print 2>/dev/null || true
            echo "dist-debug:"
            find dist-debug -maxdepth 3 -type f -print 2>/dev/null || true
            exit 1
          fi

      - name: Resolve release variables
        shell: bash
        run: |
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "$GRADLE_VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v$GRADLE_VERSION_NAME"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          else
            VERSION_NAME="${TAG_NAME#v}"
          fi

          echo "GRADLE_VERSION_NAME=$GRADLE_VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Decode signing keystore
        if: github.event_name == 'workflow_dispatch' && env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > signing-keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/signing-keystore.jks" >> $GITHUB_ENV

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi

          set +e
          $GRADLE_CMD :app:assembleRelease --no-daemon --stacktrace
          release_code=$?
          set -e

          mkdir -p dist
          if ls app/build/outputs/apk/release/*.apk >/dev/null 2>&1; then
            cp app/build/outputs/apk/release/*.apk dist/
            echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"
          else
            $GRADLE_CMD :app:assembleDebug --no-daemon --stacktrace
            cp app/build/outputs/apk/debug/*.apk dist/
            echo "APK_CHANNEL=debug APK" >> "$GITHUB_ENV"
          fi

      - name: Verify APK exists
        shell: bash
        run: |
          ls -lah dist
          test -n "$(find dist -maxdepth 1 -name '*.apk' -print -quit)"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            ## ${{ env.TAG_NAME }} 更新内容

            这次版本重点解决安装签名、图标显示、沉浸式状态栏和运行卡顿问题。

            ### 签名与安装
            - 新增固定 release 签名配置，CI 没有 GitHub Secrets 时也会使用仓库内应用专用 JKS 生成签名 APK。
            - 版本升级为 `1.4`，版本代码升级为 `5`。
            - 后续版本继续复用同一签名后，可直接覆盖升级安装，减少“签名验证/签名不一致”问题。
            - 说明：v1.3 是 debug APK，v1.4 开始发布页优先提供签名 release APK。

            ### 图标与视觉
            - 重新优化应用图标前景，进一步缩小并居中到 adaptive icon 安全区。
            - 避免安装器、桌面启动器使用圆角/圆形 mask 时图标内容过满或被裁切。
            - 保持原有蓝白图片工坊风格，但增加透明留白。

            ### 沉浸式适配
            - 状态栏和导航栏改为透明沉浸式。
            - 使用 `SystemBarStyle.auto` 自动适配浅色/深色系统栏图标。
            - 保留页面顶部 `statusBarsPadding`，避免内容被状态栏遮挡。

            ### 性能与卡顿优化
            - 结果预览图片改为采样解码，限制预览最大边，避免大图直接全尺寸解码导致卡顿和内存抖动。
            - 首页高级参数和历史记录继续保持按需展开，降低首屏组合和渲染压力。
            - 历史记录展开后仍限制最近 8 条，避免大量列表项一次性渲染。

            ### 继承自 1.3 的体验优化
            - 首页聚焦任务创建，接口配置、API Key、模型 ID 留在二级“接口设置”页面。
            - 模型选择从首页移除，首页仅展示当前模型摘要。
            - 尺寸、质量、输出格式、背景、生成数量等选项统一使用下拉选择，替代 Chip 式铺开布局。
            - 发布页固定使用版本 `${{ env.TAG_NAME }}`，便于像之前一样从 Releases 页面下载。

            ### 版本信息
            - Release Tag: `${{ env.TAG_NAME }}`
            - Version Name: `${{ env.VERSION_NAME }}`
            - Gradle Version Name: `${{ env.GRADLE_VERSION_NAME }}`
            - Artifact: `${{ env.APK_CHANNEL }}`
          files: dist/*.apk
          draft: false
          prerelease: false
          make_latest: true
