name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.3"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.3"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-debug-apk
          path: dist
          if_no_artifact_found: fail

      - name: Resolve release variables
        shell: bash
        run: |
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "$GRADLE_VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v$GRADLE_VERSION_NAME"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          else
            VERSION_NAME="${TAG_NAME#v}"
          fi

          echo "GRADLE_VERSION_NAME=$GRADLE_VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Decode signing keystore
        if: github.event_name == 'workflow_dispatch' && env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > signing-keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/signing-keystore.jks" >> $GITHUB_ENV

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/

      - name: Verify APK exists
        shell: bash
        run: |
          ls -lah dist
          test -n "$(find dist -maxdepth 1 -name '*.apk' -print -quit)"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            ## 更新内容

            - 独立版本发布到 `${{ env.TAG_NAME }}`，不再覆盖旧版本 Release
            - 首页改为聚焦任务创建，接口配置迁移到二级设置页，避免首页直接裸露
            - 多个参数选择项改为下拉栏，降低页面拥挤与交互负担
            - 优化主界面结构与渲染压力，缓解 debug 版卡顿问题
            - 调整应用图标前景安全区，避免图标内容过满
            - 使用固定签名发布，便于后续版本持续同签名升级
            - 本次发布产物切换为 `release APK`，减少调试开销

            ### 版本信息
            - Release Tag: `${{ env.TAG_NAME }}`
            - Version Name: `${{ env.VERSION_NAME }}`
            - Gradle Version Name: `${{ env.GRADLE_VERSION_NAME }}`
            - Artifact: release APK
          files: dist/*.apk
          draft: false
          prerelease: false
          make_latest: true
