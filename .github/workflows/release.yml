name: Release Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.9"
        required: false
        type: string
        default: "v1.9"

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14.3'

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
          TAG_NAME="${{ github.event.inputs.tag_name || '' }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v$VERSION_NAME"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use default signing behavior."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi
          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace
          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          test -n "$RELEASE_APK"
          cp "$RELEASE_APK" dist/app-release.apk
          ls -lah dist/app-release.apk

      - name: Publish APK to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BODY_FILE="$RUNNER_TEMP/release-body.md"
          cat > "$BODY_FILE" <<'BODY'
          # UniversalImageStudio v1.9

          本版本聚焦于图像生成体验、引导流程稳定性、移动端交互性能和自动发布链路。

          ## 主要能力

          - 支持文本生成图片与参考图编辑两种创作方式。
          - 支持 OpenAI 兼容图像接口配置，可自定义接口、模型、尺寸、质量与格式。
          - 支持后台生成任务、生成完成通知、历史记录查看与图片分享。
          - 支持首次使用引导和设置页重新打开引导，便于重新查看使用说明。

          ## 当前修复重点

          ### 再来一次引导

          - 修复已完成过引导的用户，从设置页点击“再来一次引导”后第一页一闪而过的问题。
          - 修复退出应用再进入后，需要连续点击多次才可正常重新进入引导的问题。
          - 每次从设置页重新打开引导都会创建新的引导会话。
          - 引导页会强制从第一页开始，不再复用旧页面状态。
          - 引导期间顶层主页返回逻辑不会抢占当前引导流程。

          ### 性能与交互

          - 参考图选择后延迟到生成时再读取，减少刚打开图片后的卡顿。
          - 接口、模型与生成参数选择器使用对话框列表展示，避免底部弹层带来的重布局压力。
          - 生成完成后支持通知栏提示。

          ### 发布链路

          - Release workflow 会覆盖上传同一个 `v1.9` 的 `app-release.apk` 资产。
          - Build workflow 不再依赖 `actions/upload-artifact`，避免 artifact 服务异常影响 APK 生成。
          - 文档类变更不再触发无意义 APK 构建与重新发布。

          ## 下载

          下载下方 `app-release.apk` 安装即可。

          - 包名：`com.yang.emperor`
          - 文件：`app-release.apk`
          BODY

          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "UniversalImageStudio $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          else
            gh release create "$TAG_NAME" \
              --title "UniversalImageStudio $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          fi

          gh release delete-asset "$TAG_NAME" app-release.apk -y || true
          gh release delete-asset "$TAG_NAME" app-debug.apk -y || true
          gh release upload "$TAG_NAME" dist/app-release.apk --clobber
