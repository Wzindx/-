name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.9"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.9"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Release APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist-release dist
          ARTIFACT_NAME="universal-image-studio-release-apk"
          RUN_ID="${{ github.event.workflow_run.id }}"
          gh run download "$RUN_ID" --name "$ARTIFACT_NAME" --dir dist-release
          RELEASE_APK="$(find dist-release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "No release APK artifact found from triggering workflow."
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          TAG_NAME="v$GRADLE_VERSION_NAME"
          echo "VERSION_NAME=$GRADLE_VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14.3'

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi
          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace
          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          test -n "$RELEASE_APK"
          cp "$RELEASE_APK" dist/app-release.apk

      - name: Verify release APK exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          test -f dist/app-release.apk

      - name: Delete stale debug APK asset from this release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh release delete-asset "$TAG_NAME" app-debug.apk -y
          exit 0

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            - v1.9 全面升级 Kotlin 2.3.20、AGP 8.12.1、Compose BOM 2026.04.00。
            - 清理旧版兼容残留，修复新版 Compose / Material3 API 兼容问题。
            - UI 调整为 MIUIX 风格：大圆角、浅色分组卡片、柔和蓝紫主色和更清晰的页面层级。
            - 参考 HyperCeiler 的首次体验思路，新增多页 OOBE 引导：欢迎、能力说明、接口配置、开始使用。
            - OOBE 支持跳过，后续仍可在设置页重新打开引导。
            - 下载下方 `app-release.apk` 安装即可，包名：`com.yang.emperor`。
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
