name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.4"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.4"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-release-apk
          path: dist-release
          if_no_artifact_found: fail

      - name: Collect release APK
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          RELEASE_APK="$(find dist-release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "No release APK artifact found from triggering workflow."
            find dist-release -maxdepth 5 -type f -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "$GRADLE_VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v$GRADLE_VERSION_NAME"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          else
            VERSION_NAME="${TAG_NAME#v}"
          fi

          echo "GRADLE_VERSION_NAME=$GRADLE_VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          unset ANDROID_KEYSTORE_PATH
          unset ANDROID_KEYSTORE_PASSWORD
          unset ANDROID_KEY_ALIAS
          unset ANDROID_KEY_PASSWORD

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi

          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace

          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "Manual release build did not produce a release APK."
            find app/build/outputs -type f -name '*.apk' -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"

      - name: Verify release APK exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          test -f dist/app-release.apk

      - name: Delete stale debug APK asset from this release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh release delete-asset "$TAG_NAME" app-debug.apk -y
          exit 0

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            ## ${{ env.TAG_NAME }} 更新内容

            这次版本重点解决安装签名、图标显示、沉浸式状态栏和运行卡顿问题。

            ### 签名与安装
            - 使用仓库内固定 release JKS 生成签名 APK，避免旧 GitHub Secrets 覆盖导致签名失败。
            - 版本升级为 `1.4`，版本代码升级为 `5`。
            - 后续版本继续复用同一签名后，可直接覆盖升级安装。
            - 发布页现在只保留正式签名的 `app-release.apk`。

            ### 图标与视觉
            - 重新优化应用图标前景，进一步缩小并居中到 adaptive icon 安全区。
            - 避免安装器、桌面启动器使用圆角/圆形 mask 时图标内容过满或被裁切。
            - 保持原有蓝白图片工坊风格，并增加透明留白。

            ### 沉浸式适配
            - 状态栏和导航栏改为透明沉浸式。
            - 使用 `SystemBarStyle.auto` 自动适配浅色/深色系统栏图标。
            - 保留页面顶部 `statusBarsPadding`，避免内容被状态栏遮挡。

            ### 性能与卡顿优化
            - 结果预览图片改为采样解码，限制预览最大边，避免大图直接全尺寸解码导致卡顿和内存抖动。
            - 首页高级参数和历史记录继续保持按需展开，降低首屏组合和渲染压力。
            - 历史记录展开后仍限制最近 8 条，避免大量列表项一次性渲染。

            ### 继承自 1.3 的体验优化
            - 首页聚焦任务创建，接口配置、API Key、模型 ID 留在二级“接口设置”页面。
            - 模型选择从首页移除，首页仅展示当前模型摘要。
            - 尺寸、质量、输出格式、背景、生成数量等选项统一使用下拉选择，替代 Chip 式铺开布局。
            - 发布页固定使用版本 `${{ env.TAG_NAME }}`，便于从 Releases 页面下载。

            ### 版本信息
            - Release Tag: `${{ env.TAG_NAME }}`
            - Version Name: `${{ env.VERSION_NAME }}`
            - Gradle Version Name: `${{ env.GRADLE_VERSION_NAME }}`
            - Artifact: `${{ env.APK_CHANNEL }}`
          files: dist/app-release.apk
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
