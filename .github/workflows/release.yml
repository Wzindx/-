name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v2.1. Leave empty to use app versionName."
        required: false
        type: string
        default: ""

concurrency:
  group: android-release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail

          VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
          TAG_NAME="${{ github.event.inputs.tag_name || '' }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v$VERSION_NAME"
          fi

          RELEASE_ENABLED="true"
          RELEASE_SHA="$(git rev-parse HEAD)"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
            git fetch origin main --depth=1
            LATEST_MAIN_SHA="$(git rev-parse origin/main)"
            if [ "$RELEASE_SHA" != "$LATEST_MAIN_SHA" ]; then
              echo "Skip stale release: workflow_run SHA $RELEASE_SHA is not latest main $LATEST_MAIN_SHA."
              RELEASE_ENABLED="false"
            fi
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"
          echo "RELEASE_ENABLED=$RELEASE_ENABLED" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        if: env.RELEASE_ENABLED == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        if: env.RELEASE_ENABLED == 'true'
        uses: android-actions/setup-android@v4

      - name: Configure Android SDK path
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"

          if [ ! -d "$SDK_DIR" ]; then
            echo "Android SDK directory does not exist: $SDK_DIR"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_DIR" > local.properties

          echo "Configured Android SDK:"
          cat local.properties

      - name: Prepare release signing
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use default signing behavior."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Release APK
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f ./gradlew ]; then
            echo "Missing Gradle Wrapper script: ./gradlew"
            exit 1
          fi

          if [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Missing Gradle Wrapper jar: ./gradle/wrapper/gradle-wrapper.jar"
            exit 1
          fi

          chmod +x ./gradlew
          ./gradlew --version
          test -f local.properties
          cat local.properties
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          test -n "$RELEASE_APK"
          cp "$RELEASE_APK" dist/app-release.apk
          ls -lah dist/app-release.apk

      - name: Publish APK to GitHub Release
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BODY_FILE="$RUNNER_TEMP/release-body.md"
          cat > "$BODY_FILE" <<'BODY'
          ImageForge v2.1 是当前推荐安装版本，重点改进了图片生成后的预览、保存、分享、历史记录、错误提示、通知回跳和自动发布流程。

          ## 下载与安装

          请在本页面下方 Assets 中下载：

          - `app-release.apk`

          安装信息：

          - 应用包名：`com.yang.emperor`
          - 版本号：`__VERSION_NAME__`
          - 安装文件：`app-release.apk`

          如果浏览器提示 APK 文件风险，请确认下载来源为本 GitHub Release 页面后再安装。

          ## 这个版本适合谁

          本版本适合需要在 Android 手机上调用 OpenAI 兼容图像接口的用户。你可以配置自己的 Base URL、API Key、接口模式和模型 ID，用于文本生成图片或参考图编辑。

          ## 主要功能

          - 文本生成图片。
          - 参考图 / 图生图编辑。
          - OpenAI 兼容图像接口配置。
          - 自定义 Base URL、API Key、接口模式、模型、尺寸、质量、格式和生成数量。
          - 后台生成任务。
          - 生成完成通知。
          - 应用内历史记录。
          - 图片预览、保存、打开和分享。
          - 完整错误详情查看与复制。

          ## v2.1 重点改进

          ### 生成结果与历史记录

          - 生成成功后停留在结果预览页，不再强制跳转到图片记录页。
          - 图片先保存到 ImageForge 应用内部记录，不再自动写入系统相册。
          - 需要导出图片时，可以手动点击保存到系统相册或自定义目录。
          - 删除系统相册中的图片不会影响 App 内历史记录预览。
          - 历史记录详情页统一承载打开、保存、分享和错误复制等操作。
          - 长提示词支持滚动查看，长按即可复制。

          ### 保存、分享与打开

          - 分享功能改为 FileProvider 缓存文件分享，减少系统 URI 权限异常。
          - 保存和分享前会检查图片 URI 是否可读。
          - 保存失败或分享失败时只显示明确错误，不再导致应用闪退。
          - 自定义保存目录支持 SAF 授权，修复 tree URI 导致的保存异常。

          ### 网络与错误提示

          - 网络断流、EOFException、空响应、连接复用异常等问题会显示更友好的提示。
          - 错误详情保留 HTTP 状态码、响应体和完整异常信息，便于排查 Base URL、API Key、模型和代理问题。
          - 新增对 HTTP 524 / Cloudflare 源站超时的识别与说明。
          - 失败记录支持复制完整错误详情。

          ### 通知与交互

          - 生成完成通知文案更简洁。
          - 点击通知会回到 ImageForge 内部查看生成结果，而不是跳到外部图片查看器。
          - 生成按钮统一为“生成图像”；任务运行中复用为“取消生成图像”。
          - 删除入口收敛为长按操作，减少误触。

          ### 模型与维护

          - 内置模型预设精简为 image-2 系列。
          - 继续支持手动输入自定义模型 ID。
          - 自动构建和发布链路已优化，Release 会自动对齐 tag、目标提交和 APK 资产。

          ## 使用提示

          - 第一次使用前，请在设置中填写 Base URL 和 API Key。
          - 如果你使用中转服务，请确认接口路径是否兼容 OpenAI Images / Responses 格式。
          - 如果生成失败，请打开历史记录详情并复制完整错误，用于排查网络、鉴权、模型或服务端问题。
          - 如果需要把图片保存到相册，请在结果或历史详情中手动点击保存。

          ## 验证状态

          本版本已通过自动化流程验证：

          - Android Lint：通过。
          - Debug APK：构建通过。
          - Release APK：构建通过。
          - GitHub Release：自动上传完成。
          - Release tag：已自动对齐发布提交。
          BODY

          sed -i "s/__TAG_NAME__/$TAG_NAME/g; s/__VERSION_NAME__/$VERSION_NAME/g" "$BODY_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME" --force || true
          git tag -f "$TAG_NAME" "$RELEASE_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --target "$RELEASE_SHA" \
              --title "ImageForge $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          else
            gh release create "$TAG_NAME" \
              --target "$RELEASE_SHA" \
              --title "ImageForge $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          fi

          gh release delete-asset "$TAG_NAME" app-release.apk -y || true
          gh release delete-asset "$TAG_NAME" app-debug.apk -y || true
          gh release upload "$TAG_NAME" dist/app-release.apk --clobber