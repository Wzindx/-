name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v2.2. Leave empty to use app versionName."
        required: false
        type: string
        default: ""

concurrency:
  group: android-release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail

          VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
          TAG_NAME="${{ github.event.inputs.tag_name || '' }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v$VERSION_NAME"
          fi

          RELEASE_ENABLED="true"
          RELEASE_SHA="$(git rev-parse HEAD)"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
            git fetch origin main --depth=1
            LATEST_MAIN_SHA="$(git rev-parse origin/main)"
            if [ "$RELEASE_SHA" != "$LATEST_MAIN_SHA" ]; then
              echo "Skip stale release: workflow_run SHA $RELEASE_SHA is not latest main $LATEST_MAIN_SHA."
              RELEASE_ENABLED="false"
            fi
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"
          echo "RELEASE_ENABLED=$RELEASE_ENABLED" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        if: env.RELEASE_ENABLED == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        if: env.RELEASE_ENABLED == 'true'
        uses: android-actions/setup-android@v4

      - name: Configure Android SDK path
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"

          if [ ! -d "$SDK_DIR" ]; then
            echo "Android SDK directory does not exist: $SDK_DIR"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_DIR" > local.properties

          echo "Configured Android SDK:"
          cat local.properties

      - name: Prepare release signing
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use default signing behavior."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Release APK
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f ./gradlew ]; then
            echo "Missing Gradle Wrapper script: ./gradlew"
            exit 1
          fi

          if [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Missing Gradle Wrapper jar: ./gradle/wrapper/gradle-wrapper.jar"
            exit 1
          fi

          chmod +x ./gradlew
          ./gradlew --version
          test -f local.properties
          cat local.properties
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          test -n "$RELEASE_APK"
          cp "$RELEASE_APK" dist/app-release.apk
          ls -lah dist/app-release.apk

      - name: Publish APK to GitHub Release
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BODY_FILE="$RUNNER_TEMP/release-body.md"
          cat > "$BODY_FILE" <<'BODY'
          ## v2.2 更新内容

          本页面只说明 ImageForge `__TAG_NAME__` 的全部更新，不包含其它版本的更新记录。

          ### 取消生成与后台任务

          - 加强取消生成逻辑：点击取消后会立即标记任务为已取消，并主动中断底层图片 API 网络连接。
          - 修复取消后的后台迟到结果仍可能写入记录、弹出成功提示或失败提示的问题。
          - 取消任务不再作为失败图片长期留存在历史记录中，避免误以为取消的照片仍在后台生成。
          - 后台任务完成、失败、保存、通知前都会再次检查任务是否已取消，已取消任务的结果会被直接丢弃。

          ### 配置记忆

          - 自动记忆上次使用的 Base URL、API Key、接口模式、文生图模型、图生图模型。
          - 自动记忆上次使用的 Prompt、尺寸、质量、数量、输出格式和背景参数。
          - 参数面板中的尺寸、质量、输出格式、背景和数量修改后会立即保存。
          - 下次打开应用会恢复上次配置，不再回到初始默认参数。

          ### VPN / 代理连接稳定性

          - 针对 `Software caused connection abort` 增加专门识别和更明确的排查提示。
          - 图片请求强制使用 `Connection: close`，降低 VPN / 代理环境下连接复用导致的读取响应头失败。
          - 取消任务时会主动 `disconnect()` 当前 HTTP 连接，并清理活动连接表，减少后台残留请求。
          - 对代理节点断流、网关提前关闭连接、响应头读取失败、连接重置等场景继续保留自动重试。

          ### 参考图读取

          - 参考图选择入口改为系统文档选择器，兼容更多相册、文件管理器和云端图片提供器。
          - 选中参考图后立即读取到应用私有缓存，生成时不再依赖临时 URI 二次读取。
          - 如果读取失败，会清理无效状态并提示重新选择，避免带着坏缓存继续生成。

          ### 参考图缓存清理

          - 更换参考图前会清理旧参考图缓存。
          - 手动清除参考图时会同步删除缓存。
          - 图生图任务成功、失败或取消后会自动清理参考图缓存。
          - 启动读取时会顺带清理过期参考图缓存，避免长期占用空间。

          ### 图片打开体验

          - 打开历史图片时不再先同步读取整张图片做探测。
          - 点击打开后直接交给系统图片查看器，减少主流程等待和 I/O 阻塞。
          - 保留系统 URI 读权限授权，提升外部查看器打开成功率。

          ## 下载与安装

          请在本页面下方 Assets 中下载：

          - `app-release.apk`

          安装信息：

          - 应用包名：`com.yang.emperor`
          - 版本号：`__VERSION_NAME__`
          - 安装文件：`app-release.apk`

          如果浏览器提示 APK 文件风险，请确认下载来源为本 GitHub Release 页面后再安装。


          ## 使用提示

          - 第一次使用前，请在设置中填写 Base URL 和 API Key。
          - 如果你使用中转服务，请确认接口路径是否兼容 OpenAI Images / Responses 格式。
          - 如果生成失败，请打开历史记录详情并复制完整错误，用于排查网络、鉴权、模型或服务端问题。
          - 如果需要把图片保存到相册，请在结果或历史详情中手动点击保存。

          ## 验证状态

          本版本已通过自动化流程验证：

          - Release APK：构建通过。
          - GitHub Release：自动覆盖上传完成。
          - Release tag：已自动对齐本次参考图优化提交。
          BODY

          sed -i "s/__TAG_NAME__/$TAG_NAME/g; s/__VERSION_NAME__/$VERSION_NAME/g" "$BODY_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME" --force || true
          git tag -f "$TAG_NAME" "$RELEASE_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --target "$RELEASE_SHA" \
              --title "ImageForge $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          else
            gh release create "$TAG_NAME" \
              --target "$RELEASE_SHA" \
              --title "ImageForge $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          fi

          gh release delete-asset "$TAG_NAME" app-release.apk -y || true
          gh release delete-asset "$TAG_NAME" app-debug.apk -y || true
          gh release upload "$TAG_NAME" dist/app-release.apk --clobber