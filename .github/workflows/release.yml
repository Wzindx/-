name: Release Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v1.5"
        required: false
        type: string
      version_name:
        description: "Optional version name override, e.g. 1.5"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release APK artifact from triggering workflow
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: universal-image-studio-release-apk
          path: dist-release
          if_no_artifact_found: fail

      - name: Collect release APK
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          RELEASE_APK="$(find dist-release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "No release APK artifact found from triggering workflow."
            find dist-release -maxdepth 5 -type f -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "$GRADLE_VERSION_NAME" ]; then
            echo "Failed to read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="v$GRADLE_VERSION_NAME"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version_name }}" ]; then
            VERSION_NAME="${{ inputs.version_name }}"
          else
            VERSION_NAME="${TAG_NAME#v}"
          fi

          echo "GRADLE_VERSION_NAME=$GRADLE_VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Set up Java
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Release APK for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          unset ANDROID_KEYSTORE_PATH
          unset ANDROID_KEYSTORE_PASSWORD
          unset ANDROID_KEY_ALIAS
          unset ANDROID_KEY_PASSWORD

          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            GRADLE_CMD=./gradlew
          else
            GRADLE_CMD=gradle
          fi

          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace

          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          if [ -z "$RELEASE_APK" ]; then
            echo "Manual release build did not produce a release APK."
            find app/build/outputs -type f -name '*.apk' -print 2>/dev/null || true
            exit 1
          fi
          cp "$RELEASE_APK" dist/app-release.apk
          echo "APK_CHANNEL=release APK" >> "$GITHUB_ENV"

      - name: Verify release APK exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          test -f dist/app-release.apk

      - name: Delete stale debug APK asset from this release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh release delete-asset "$TAG_NAME" app-debug.apk -y
          exit 0

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: UniversalImageStudio ${{ env.TAG_NAME }}
          body: |
            ## ${{ env.TAG_NAME }} 更新内容

            这次版本重点完善图生图接口兼容、尺寸/比例选择、返回逻辑、Material You 动态色覆盖，并提前完成 GitHub Actions Node 24 兼容验证。

            ### 接口兼容与图生图适配
            - 新增 **Generations 图生图兼容** 模式，用于兼容部分中转站将图生图实现到 `/v1/images/generations` 的非标准场景。
            - 图生图现在支持三种路径：`/v1/images/edits`、`/v1/responses`、`/v1/images/generations` 兼容模式。
            - 修复 Generations 图生图兼容模式在大图参考图下可能因 Base64 JSON 过大导致 OOM 闪退的问题。
            - 兼容模式现在会压缩参考图并限制请求体体积，过大图片会给出错误提示，避免直接崩溃。
            - 保留 `Images API` 与 `Responses API` 双模式配置，继续适配不同 OpenAI 兼容服务。

            ### 尺寸、比例与模型列表
            - 首页尺寸选择调整为 **尺寸 / 比例** 单一选择框，避免把固定分辨率误解为比例与画质可任意组合。
            - 画质作为独立 API 参数保留在高级参数中，可继续选择 `auto`、`low`、`medium`、`high`。
            - 补全常用尺寸/比例预设：`1:1`、`3:2`、`2:3`、`4:3`、`3:4`、`16:9`、`9:16`。
            - 推荐模型列表移除 DALL·E 系列，减少不适合当前兼容目标的推荐项。
            - 仍保留自定义模型 ID 输入能力，方便接入任意兼容模型。

            ### 导航与 Material You 体验
            - 修复设置页系统返回键直接退出 App 的问题，现在会先返回首页。
            - 扩大 Monet / Material You 动态色覆盖范围，让首页、设置页、卡片、顶栏和系统栏颜色更协调。
            - 降低状态栏与应用界面颜色割裂感，使整体观感更接近系统原生 Material 3 风格。

            ### GitHub Actions 与发布维护
            - Android 构建 workflow 与 Release workflow 已加入 Node 24 兼容验证开关。
            - 提前应对 GitHub Actions Node.js 20 弃用提醒，降低后续 runner 默认升级后的风险。
            - 持续使用仓库内固定 release JKS 生成正式签名 APK。
            - 版本升级为 `${{ env.VERSION_NAME }}`，后续仍可直接覆盖升级安装。
            - 发布页继续只保留正式签名的 `app-release.apk`。


            ### 版本信息
            - Release Tag: `${{ env.TAG_NAME }}`
            - Version Name: `${{ env.VERSION_NAME }}`
            - Gradle Version Name: `${{ env.GRADLE_VERSION_NAME }}`
            - Artifact: `${{ env.APK_CHANNEL }}`

          files: dist/app-release.apk
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
