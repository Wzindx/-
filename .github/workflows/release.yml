name: Release Android APK

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish to, e.g. v2.0. Leave empty to use app versionName."
        required: false
        type: string
        default: ""

concurrency:
  group: android-release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0

      - name: Resolve release variables
        shell: bash
        run: |
          set -euo pipefail

          VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
          TAG_NAME="${{ github.event.inputs.tag_name || '' }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="v$VERSION_NAME"
          fi

          RELEASE_ENABLED="true"
          RELEASE_SHA="$(git rev-parse HEAD)"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
            git fetch origin main --depth=1
            LATEST_MAIN_SHA="$(git rev-parse origin/main)"
            if [ "$RELEASE_SHA" != "$LATEST_MAIN_SHA" ]; then
              echo "Skip stale release: workflow_run SHA $RELEASE_SHA is not latest main $LATEST_MAIN_SHA."
              RELEASE_ENABLED="false"
            fi
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=$RELEASE_SHA" >> "$GITHUB_ENV"
          echo "RELEASE_ENABLED=$RELEASE_ENABLED" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        if: env.RELEASE_ENABLED == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: env.RELEASE_ENABLED == 'true'
        uses: android-actions/setup-android@v4

      - name: Configure Android SDK path
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"

          if [ ! -d "$SDK_DIR" ]; then
            echo "Android SDK directory does not exist: $SDK_DIR"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_DIR" > local.properties

          echo "Configured Android SDK:"
          cat local.properties

      - name: Prepare release signing
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use default signing behavior."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Release APK
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f ./gradlew ]; then
            echo "Missing Gradle Wrapper script: ./gradlew"
            exit 1
          fi

          if [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Missing Gradle Wrapper jar: ./gradle/wrapper/gradle-wrapper.jar"
            exit 1
          fi

          chmod +x ./gradlew
          ./gradlew --version
          test -f local.properties
          cat local.properties
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

          mkdir -p dist
          RELEASE_APK="$(find app/build/outputs/apk/release -name '*release*.apk' -print -quit 2>/dev/null || true)"
          test -n "$RELEASE_APK"
          cp "$RELEASE_APK" dist/app-release.apk
          ls -lah dist/app-release.apk

      - name: Publish APK to GitHub Release
        if: env.RELEASE_ENABLED == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BODY_FILE="$RUNNER_TEMP/release-body.md"
          cat > "$BODY_FILE" <<BODY
          # UniversalImageStudio $TAG_NAME

          本版本是 UniversalImageStudio 的 2.0 最终优化版，重点完成界面架构拆分、移动端交互整理、构建发布链路稳定化，并保持图像生成主流程可直接使用。

          ## 2.0 优化重点

          - 将 `MainActivity.kt` 中的通用 UI 组件拆分到 `MainUiComponents.kt`，降低主 Activity 体积和维护成本。
          - 保留文生图、参考图编辑、后台任务、历史记录、保存、分享和通知等核心能力。
          - 优化移动端界面组织方式，继续使用底部面板承载配置项，减少首页长期配置噪音。
          - 保持参考图按需读取与压缩策略，减少从系统相册返回应用时的卡顿。
          - 保持首次引导和设置页重新引导入口，方便用户重新配置接口信息。
          - 完整验证 Gradle Wrapper、Android Lint、Debug APK、Release APK 与自动发布链路。
          - Release 页面现在会根据版本动态生成说明，避免后续版本继续复用旧版文案。

          ## 主要能力

          - 文本生成图片。
          - 参考图 / 图生图编辑。
          - OpenAI 兼容图像接口配置。
          - 自定义 Base URL、API Key、接口模式、模型、尺寸、质量、格式和生成数量。
          - 后台生成任务、完成通知、历史记录查看、图片保存与分享。
          - 移动端优先的参数选择和引导体验。

          ## 下载

          下载下方 `app-release.apk` 安装即可。

          - 包名：`com.yang.emperor`
          - 版本：`$VERSION_NAME`
          - 文件：`app-release.apk`

          ## 验证状态

          - Android Lint：通过 CI 执行。
          - Debug APK：通过 CI 构建。
          - Release APK：通过 CI 构建并自动上传到 GitHub Release。
          BODY

          git tag -f "$TAG_NAME" "$RELEASE_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "UniversalImageStudio $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          else
            gh release create "$TAG_NAME" \
              --title "UniversalImageStudio $TAG_NAME" \
              --notes-file "$BODY_FILE" \
              --latest
          fi

          gh release delete-asset "$TAG_NAME" app-release.apk -y || true
          gh release delete-asset "$TAG_NAME" app-debug.apk -y || true
          gh release upload "$TAG_NAME" dist/app-release.apk --clobber
