name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Select Gradle command
        shell: bash
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          $GRADLE_CMD :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build-debug.log
          echo "${PIPESTATUS[0]}" > build-debug-exit-code.txt
          exit 0

      - name: Build Release APK
        shell: bash
        run: |
          set +e
          unset ANDROID_KEYSTORE_PATH
          unset ANDROID_KEYSTORE_PASSWORD
          unset ANDROID_KEY_ALIAS
          unset ANDROID_KEY_PASSWORD
          $GRADLE_CMD :app:assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build-release.log
          echo "${PIPESTATUS[0]}" > build-release-exit-code.txt
          exit 0

      - name: Collect APK outputs
        if: always()
        shell: bash
        run: |
          mkdir -p dist-debug dist-release
          find app/build/outputs -type f -iname '*debug*.apk' -exec cp {} dist-debug/ \; 2>/dev/null || true
          find app/build/outputs -type f -iname '*release*.apk' -exec cp {} dist-release/ \; 2>/dev/null || true
          echo "All APK outputs:"
          find app/build/outputs -type f -iname '*.apk' -print 2>/dev/null || true
          echo "Debug artifacts:"
          find dist-debug -type f -print || true
          echo "Release artifacts:"
          find dist-release -type f -print || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-image-studio-debug-apk
          path: dist-debug/*.apk
          if-no-files-found: ignore

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-image-studio-release-apk
          path: dist-release/*.apk
          if-no-files-found: ignore

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            build-debug.log
            build-debug-exit-code.txt
            build-release.log
            build-release-exit-code.txt
          if-no-files-found: ignore

      - name: Commit Build Report
        if: always() && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
        shell: bash
        run: |
          mkdir -p build-report
          cp build-debug.log build-report/build-debug.log || true
          cp build-debug-exit-code.txt build-report/build-debug-exit-code.txt || true
          cp build-release.log build-report/build-release.log || true
          cp build-release-exit-code.txt build-report/build-release-exit-code.txt || true

          if find dist-release -type f -iname '*.apk' -print -quit | grep -q .; then
            echo 0 > build-report/build-exit-code.txt
            echo "Release APK build succeeded." > build-report/summary.txt
          elif find dist-debug -type f -iname '*.apk' -print -quit | grep -q .; then
            echo 0 > build-report/build-exit-code.txt
            echo "Debug APK build succeeded; release APK missing." > build-report/summary.txt
          else
            echo 1 > build-report/build-exit-code.txt
            echo "APK build failed. Check build-debug.log and build-release.log." > build-report/summary.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-report/
          if ! git diff --cached --quiet; then
            git commit -m "Update build report [skip ci]"
            git push
          fi

      - name: Validate APK Exists
        shell: bash
        run: |
          if find dist-release -type f -iname '*.apk' -print -quit | grep -q .; then
            echo "Release APK build succeeded."
          elif find dist-debug -type f -iname '*.apk' -print -quit | grep -q .; then
            echo "Debug APK build succeeded, but release APK is missing."
            exit 1
          else
            echo "APK build failed. Download build-logs artifact for details."
            exit 1
          fi
