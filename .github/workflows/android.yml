name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > signing-keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/signing-keystore.jks" >> $GITHUB_ENV

      - name: Build Signed Release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set +e
          gradle assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build.log
          gradle_code=${PIPESTATUS[0]}

          if ls app/build/outputs/apk/release/*.apk >/dev/null 2>&1; then
            echo "Release APK artifact exists; treating build as successful."
            echo 0 > build-exit-code.txt
          else
            echo "$gradle_code" > build-exit-code.txt
          fi

          exit 0

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: |
            build.log
            build-exit-code.txt

      - name: Commit Build Report
        if: always()
        shell: bash
        run: |
          mkdir -p build-report
          cp build.log build-report/build.log || true
          cp build-exit-code.txt build-report/build-exit-code.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-report/build.log build-report/build-exit-code.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update build report [skip ci]"
            git push
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-image-studio-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Validate APK Exists
        shell: bash
        run: |
          if ls app/build/outputs/apk/release/*.apk >/dev/null 2>&1; then
            echo "Release APK build succeeded."
          else
            echo "Release APK build failed. See build-report/build.log."
            exit 1
          fi
