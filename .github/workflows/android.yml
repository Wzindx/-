name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.3'

      - name: Verify build environment
        shell: bash
        run: |
          set -euxo pipefail
          java -version
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
            ./gradlew --version
          else
            command -v gradle
            gradle --version
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use default signing behavior."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Debug APK
        shell: bash
        run: |
          set -o pipefail
          $GRADLE_CMD :app:assembleDebug --no-daemon --stacktrace --info

      - name: Build Release APK
        shell: bash
        run: |
          set -o pipefail
          $GRADLE_CMD :app:assembleRelease --no-daemon --stacktrace --info

      - name: Validate APK Exists
        shell: bash
        run: |
          set -euo pipefail
          find app/build/outputs -type f -iname '*.apk' -print
          if find app/build/outputs -type f -iname '*release*.apk' -print -quit | grep -q .; then
            echo "Release APK build succeeded."
          else
            echo "Release APK build failed or missing."
            exit 1
          fi
