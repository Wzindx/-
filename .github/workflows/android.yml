
name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        if: env.HAS_ANDROID_KEYSTORE == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > signing-keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/signing-keystore.jks" >> "$GITHUB_ENV"

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build-debug.log
          echo "${PIPESTATUS[0]}" > build-debug-exit-code.txt
          exit 0

      - name: Build Release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set +e
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build-release.log
          echo "${PIPESTATUS[0]}" > build-release-exit-code.txt
          exit 0

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-image-studio-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-image-studio-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            build-debug.log
            build-debug-exit-code.txt
            build-release.log
            build-release-exit-code.txt
          if-no-files-found: ignore

      - name: Commit Build Report
        if: always() && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
        shell: bash
        run: |
          mkdir -p build-report
          cp build-debug.log build-report/build-debug.log || true
          cp build-debug-exit-code.txt build-report/build-debug-exit-code.txt || true
          cp build-release.log build-report/build-release.log || true
          cp build-release-exit-code.txt build-report/build-release-exit-code.txt || true

          if ls app/build/outputs/apk/debug/*.apk >/dev/null 2>&1; then
            echo 0 > build-report/build-exit-code.txt
            echo "Debug APK build succeeded." > build-report/summary.txt
          elif ls app/build/outputs/apk/release/*.apk >/dev/null 2>&1; then
            echo 0 > build-report/build-exit-code.txt
            echo "Release APK build succeeded." > build-report/summary.txt
          else
            echo 1 > build-report/build-exit-code.txt
            echo "APK build failed. Check build-debug.log and build-release.log." > build-report/summary.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-report/
          if ! git diff --cached --quiet; then
            git commit -m "Update build report [skip ci]"
            git push
          fi

      - name: Validate APK Exists
        shell: bash
        run: |
          if ls app/build/outputs/apk/debug/*.apk >/dev/null 2>&1; then
            echo "Debug APK build succeeded."
          elif ls app/build/outputs/apk/release/*.apk >/dev/null 2>&1; then
            echo "Release APK build succeeded."
          else
            echo "APK build failed. Download build-logs artifact for details."
            exit 1
          fi
