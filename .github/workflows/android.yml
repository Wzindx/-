name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
          echo ${PIPESTATUS[0]} > build-exit-code.txt
          exit 0

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: |
            build.log
            build-exit-code.txt

      - name: Commit Build Report
        if: always()
        shell: bash
        run: |
          mkdir -p build-report
          cp build.log build-report/build.log || true
          cp build-exit-code.txt build-report/build-exit-code.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-report/build.log build-report/build-exit-code.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update build report [skip ci]"
            git push
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-image-studio-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Fail if build failed
        shell: bash
        run: |
          code=$(cat build-exit-code.txt 2>/dev/null || echo 1)
          if [ "$code" != "0" ]; then
            echo "Gradle build failed with exit code $code. See build-report/build.log."
            exit "$code"
          fi
