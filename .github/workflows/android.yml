name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Configure Android SDK path
        shell: bash
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"

          if [ ! -d "$SDK_DIR" ]; then
            echo "Android SDK directory does not exist: $SDK_DIR"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_DIR" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_DIR" > local.properties

          echo "Configured Android SDK:"
          cat local.properties

      - name: Verify build environment
        shell: bash
        run: |
          set -euxo pipefail
          java -version

          if [ ! -f ./gradlew ]; then
            echo "Missing Gradle Wrapper script: ./gradlew"
            exit 1
          fi

          if [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Missing Gradle Wrapper jar: ./gradle/wrapper/gradle-wrapper.jar"
            exit 1
          fi

          chmod +x ./gradlew
          echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          ./gradlew --version

          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          test -f local.properties
          cat local.properties

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use default signing behavior."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Run Android Lint
        shell: bash
        run: |
          set +e
          "$GRADLE_CMD" :app:lintDebug --no-daemon --stacktrace
          LINT_EXIT_CODE=$?
          echo "LINT_EXIT_CODE=$LINT_EXIT_CODE" >> "$GITHUB_ENV"
          exit 0

      - name: Publish Lint Diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "Lint exit code: ${LINT_EXIT_CODE:-unset}"
          echo "Available reports:"
          find app/build/reports -maxdepth 4 -type f -print 2>/dev/null || true

          if [ -f app/build/reports/lint-results-debug.txt ]; then
            echo "----- lint-results-debug.txt -----"
            cat app/build/reports/lint-results-debug.txt
          fi

          if [ -f app/build/reports/lint-results-debug.xml ]; then
            python3 - <<'PY'
          import html
          import os
          import sys
          import xml.etree.ElementTree as ET

          report = "app/build/reports/lint-results-debug.xml"
          root = ET.parse(report).getroot()

          def esc(value: str) -> str:
              return str(value or "").replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A").replace(":", "%3A").replace(",", "%2C")

          count = 0
          for issue in root.findall("issue"):
              issue_id = issue.attrib.get("id", "AndroidLint")
              severity = issue.attrib.get("severity", "Error")
              message = issue.attrib.get("message", "")
              explanation = issue.attrib.get("explanation", "")
              loc = issue.find("location")
              if loc is None:
                  print(f"::error title={esc(issue_id)}::{esc(message)}")
                  count += 1
                  continue

              file_path = loc.attrib.get("file", "")
              line = loc.attrib.get("line", "1")
              column = loc.attrib.get("column", "1")

              if file_path.startswith(os.getcwd() + os.sep):
                  file_path = os.path.relpath(file_path, os.getcwd())

              detail = message
              if explanation:
                  detail = f"{message}\n\n{explanation}"

              level = "error" if severity.lower() in {"fatal", "error"} else "warning"
              print(f"::{level} file={esc(file_path)},line={esc(line)},col={esc(column)},title={esc(issue_id)}::{esc(detail)}")
              count += 1

          print(f"Published {count} Android lint annotation(s).")
          PY
          fi

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            app/build/reports/lint-results-debug.*
            app/build/reports/lint-results-debug/
            app/build/reports/lint/
          if-no-files-found: warn
          retention-days: 14

      - name: Fail if Android Lint failed
        shell: bash
        run: |
          set -euo pipefail
          if [ "${LINT_EXIT_CODE:-0}" != "0" ]; then
            echo "Android Lint failed with exit code ${LINT_EXIT_CODE}."
            exit "$LINT_EXIT_CODE"
          fi

      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          "$GRADLE_CMD" :app:assembleDebug --no-daemon --stacktrace --info

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          "$GRADLE_CMD" :app:assembleRelease --no-daemon --stacktrace --info

      - name: Validate APK Exists
        shell: bash
        run: |
          set -euo pipefail
          find app/build/outputs -type f -iname '*.apk' -print

          if find app/build/outputs -type f -iname '*release*.apk' -print -quit | grep -q .; then
            echo "Release APK build succeeded."
          else
            echo "Release APK build failed or missing."
            exit 1
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UniversalImageStudio-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
