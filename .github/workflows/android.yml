name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.6'

      - name: Select Gradle command
        shell: bash
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            echo "GRADLE_CMD=gradle" >> "$GITHUB_ENV"
          fi

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured; release APK will use the default unsigned/debuggable signing behavior."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/android-signing/release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "Release signing keystore prepared."

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          $GRADLE_CMD :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build-debug.log
          echo "${PIPESTATUS[0]}" > build-debug-exit-code.txt
          exit 0

      - name: Build Release APK
        shell: bash
        run: |
          set +e
          $GRADLE_CMD :app:assembleRelease --no-daemon --stacktrace --info 2>&1 | tee build-release.log
          echo "${PIPESTATUS[0]}" > build-release-exit-code.txt
          exit 0

      - name: Collect APK outputs
        if: always()
        shell: bash
        run: |
          mkdir -p dist-debug dist-release
          find app/build/outputs -type f -iname '*debug*.apk' -exec cp {} dist-debug/ \; 2>/dev/null || true
          find app/build/outputs -type f -iname '*release*.apk' -exec cp {} dist-release/ \; 2>/dev/null || true
          echo "All APK outputs:"
          find app/build/outputs -type f -iname '*.apk' -print 2>/dev/null || true
          echo "Debug artifacts are intentionally not uploaded."
          echo "Release artifacts:"
          find dist-release -type f -print || true

      - name: Upload Release APK
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: universal-image-studio-release-apk
          path: dist-release/*.apk
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Build Logs
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: build-logs
          path: |
            build-debug.log
            build-debug-exit-code.txt
            build-release.log
            build-release-exit-code.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Validate APK Exists
        shell: bash
        run: |
          if find dist-release -type f -iname '*.apk' -print -quit | grep -q .; then
            echo "Release APK build succeeded."
          elif find dist-debug -type f -iname '*.apk' -print -quit | grep -q .; then
            echo "Debug APK build succeeded, but release APK is missing."
            exit 1
          else
            echo "APK build failed. Download build-logs artifact for details."
            exit 1
          fi
