name: One-shot Final Actions Cleanup

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete failed cancelled skipped runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          echo "Cleaning failed/cancelled/skipped workflow runs in $REPO"
          gh api "repos/$REPO/actions/runs?per_page=100" --paginate \
            --jq '.workflow_runs[] | select((.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "skipped") and (.id|tostring) != env.CURRENT_RUN_ID) | .id' \
            | while read -r run_id; do
                if [ -n "$run_id" ]; then
                  echo "Deleting run $run_id"
                  gh api -X DELETE "repos/$REPO/actions/runs/$run_id" || true
                fi
              done

      - name: Self remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/one-shot-actions-final-clean.yml
          git add .github/workflows/one-shot-actions-final-clean.yml
          git commit -m "Remove one-shot final actions cleanup workflow"
          git push
